<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DWSIM Cloud Simulation</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f12;--bg2:#13161b;--bg3:#1a1e26;--bg4:#222833;
  --border:#2a3040;--border2:#3a4358;
  --text:#c8d0e0;--text2:#7a8aa0;--text3:#4a5568;
  --accent:#00c8ff;--green:#00e5a0;--amber:#ffb020;--red:#ff4560;
  --panel-left:240px;--panel-right:280px;--header-h:52px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif}
#app{display:flex;flex-direction:column;height:100vh}

/* ── Header ── */
header{height:var(--header-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;z-index:10}
.logo-mark{width:28px;height:28px;background:var(--accent);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-inner{width:12px;height:12px;background:var(--bg);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%)}
header h1{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
header h1 span{color:var(--accent)}
.hsep{flex:1}
.status-pill{font-family:'Share Tech Mono',monospace;font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--border2);color:var(--text2);background:var(--bg3);display:flex;align-items:center;gap:6px}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Main layout ── */
.main{display:flex;flex:1;overflow:hidden}

/* ── Left Panel ── */
#left-panel{width:var(--panel-left);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.panel-header{padding:14px 16px 10px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);flex-shrink:0}
#model-tree{flex:1;overflow-y:auto;padding:8px 0}
#model-tree::-webkit-scrollbar{width:4px}
#model-tree::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.category-header{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text2);transition:color .15s;user-select:none}
.category-header:hover{color:var(--text)}
.cat-arrow{width:14px;height:14px;flex-shrink:0;transition:transform .2s}
.category.open .cat-arrow{transform:rotate(90deg)}
.category-models{display:none}
.category.open .category-models{display:block}
.model-item{display:flex;align-items:flex-start;gap:8px;padding:7px 16px 7px 36px;cursor:pointer;font-size:13px;color:var(--text2);transition:background .15s,color .15s;border-left:2px solid transparent}
.model-item:hover{background:var(--bg3);color:var(--text)}
.model-item.active{background:var(--bg3);color:var(--accent);border-left-color:var(--accent)}
.model-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);flex-shrink:0;margin-top:5px;transition:background .15s}
.model-item.active .model-dot,.model-item:hover .model-dot{background:var(--accent)}
.model-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
.tag{font-size:9px;padding:1px 5px;border-radius:3px;background:var(--bg4);color:var(--text3);font-family:'Share Tech Mono',monospace}

/* ── Canvas area ── */
#canvas-area{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* Infinite canvas container — clips and provides the viewport */
#canvas-viewport{
  flex:1;overflow:hidden;position:relative;
  background:var(--bg);
  background-image:
    radial-gradient(circle at 18% 22%,rgba(0,200,255,.04) 0%,transparent 45%),
    radial-gradient(circle at 82% 78%,rgba(0,229,160,.025) 0%,transparent 45%);
  cursor:grab;
}
#canvas-viewport.panning{cursor:grabbing}

/* The dot-grid scrolls with the transform */
#canvas-viewport::before{
  content:'';position:absolute;inset:-200%;
  background-image:radial-gradient(circle,rgba(42,48,64,.7) 1px,transparent 1px);
  background-size:28px 28px;
  pointer-events:none;
  transition:none;
}

/* The world — everything inside gets transformed */
#canvas-world{
  position:absolute;top:0;left:0;
  transform-origin:0 0;
  will-change:transform;
}

/* Empty state sits in the viewport center (not the world) */
#empty-state{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;color:var(--text3);pointer-events:none;
}
#empty-state .big-icon{font-size:48px;margin-bottom:16px;opacity:.4}
#empty-state h2{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:600;letter-spacing:1px;color:var(--text2);margin-bottom:8px}
#empty-state p{font-size:13px}

/* SVG canvas */
#flowchart-svg{overflow:visible;display:block}

/* SVG elements */
.node-label{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.5px;fill:var(--text2);text-anchor:middle;pointer-events:none}
.node-sublabel{font-family:'Share Tech Mono',monospace;font-size:10px;fill:var(--text3);text-anchor:middle;pointer-events:none}
.result-value-label{font-family:'Share Tech Mono',monospace;font-size:10px;fill:var(--green);text-anchor:middle;pointer-events:none;opacity:0;transition:opacity .4s}
.result-value-label.visible{opacity:1}
.click-hint{font-family:'Barlow',sans-serif;font-size:10px;fill:var(--text3);text-anchor:middle;pointer-events:none;opacity:0;transition:opacity .2s}
.fc-stream,.fc-equip{cursor:pointer}
.fc-stream:hover .click-hint,.fc-equip:hover .click-hint{opacity:1}

/* ── Zoom controls ── */
#zoom-controls{
  position:absolute;bottom:72px;right:16px;
  display:flex;flex-direction:column;gap:4px;
  z-index:20;
}
.zoom-btn{
  width:32px;height:32px;
  background:var(--bg2);border:1px solid var(--border2);border-radius:6px;
  color:var(--text2);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s,border-color .15s;
  user-select:none;
}
.zoom-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--accent)}
#zoom-level{
  font-family:'Share Tech Mono',monospace;font-size:10px;
  color:var(--text3);text-align:center;padding:3px 0;
}

/* ── Canvas toolbar ── */
#canvas-toolbar{
  padding:10px 16px;border-top:1px solid var(--border);
  background:var(--bg2);display:flex;align-items:center;gap:12px;flex-shrink:0;
}
#model-title-bar{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;color:var(--text)}
#model-desc-bar{font-size:12px;color:var(--text2)}
#btn-simulate{
  padding:9px 28px;background:var(--accent);color:var(--bg);
  border:none;border-radius:4px;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  transition:background .15s,transform .1s,box-shadow .15s;
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
#btn-simulate:hover:not(:disabled){background:#20dfff;box-shadow:0 0 20px rgba(0,200,255,.4)}
#btn-simulate:active:not(:disabled){transform:scale(.97)}
#btn-simulate:disabled{background:var(--bg4);color:var(--text3);cursor:not-allowed}
.sim-spinner{width:14px;height:14px;border:2px solid rgba(0,0,0,.3);border-top-color:var(--bg);border-radius:50%;animation:spin .6s linear infinite;display:none}
#btn-simulate.loading .sim-spinner{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
#btn-fit{
  padding:7px 14px;background:var(--bg3);border:1px solid var(--border2);
  border-radius:4px;color:var(--text2);cursor:pointer;font-size:12px;
  font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;
  transition:background .15s,color .15s;flex-shrink:0;
}
#btn-fit:hover{background:var(--bg4);color:var(--text)}

/* ── Right Panel ── */
#right-panel{width:var(--panel-right);background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
#results-header{padding:14px 16px 10px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:8px}
#rdot{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:background .3s,box-shadow .3s}
#rdot.ready{background:var(--green);box-shadow:0 0 8px var(--green)}
#results-body{flex:1;overflow-y:auto;padding:12px}
#results-body::-webkit-scrollbar{width:4px}
#results-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
#results-empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:12px}
#results-empty .empty-icon{font-size:32px;margin-bottom:12px;opacity:.3}
.result-group{margin-bottom:16px}
.result-group-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.result-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid rgba(42,48,64,.5);animation:fadeUp .3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.result-label{font-size:12px;color:var(--text2)}
.result-val{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--green);display:flex;align-items:baseline;gap:4px}
.result-unit{font-size:10px;color:var(--text3)}
.duration-bar{margin-top:16px;padding:8px 10px;background:var(--bg3);border-radius:4px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text3);display:flex;justify-content:space-between}
.duration-val{color:var(--amber)}

/* ── Popup ── */
#popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
#popup-overlay.open{display:flex}
#popup{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.6);animation:popIn .2s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{opacity:0;transform:scale(.9) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.popup-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.popup-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.popup-icon.stream{background:rgba(0,200,255,.15)}
.popup-icon.equipment{background:rgba(255,176,32,.15)}
.popup-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:.5px}
.popup-subtitle{font-size:11px;color:var(--text2);margin-top:1px}
.popup-close{margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1;padding:4px;transition:color .15s}
.popup-close:hover{color:var(--text)}
.popup-body{padding:16px;max-height:60vh;overflow-y:auto}
.popup-body::-webkit-scrollbar{width:4px}
.popup-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.field-group{margin-bottom:14px}
.field-label{font-size:11px;color:var(--text2);margin-bottom:5px;display:flex;justify-content:space-between;align-items:baseline}
.field-unit{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text3);background:var(--bg3);padding:1px 6px;border-radius:3px}
.field-input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:4px;padding:8px 10px;font-family:'Share Tech Mono',monospace;font-size:13px;outline:none;transition:border-color .15s,box-shadow .15s}
.field-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,200,255,.1)}
.field-desc{font-size:10px;color:var(--text3);margin-top:4px}
.popup-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.btn-sec{padding:7px 16px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;color:var(--text2);cursor:pointer;font-size:13px;transition:background .15s,color .15s}
.btn-sec:hover{background:var(--bg4);color:var(--text)}
.btn-pri{padding:7px 16px;background:var(--accent);border:none;border-radius:4px;color:var(--bg);cursor:pointer;font-size:13px;font-weight:600;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;transition:background .15s}
.btn-pri:hover{background:#20dfff}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:10px 18px;font-size:13px;color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:200;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.error{border-color:var(--red);color:var(--red)}
#toast.success{border-color:var(--green);color:var(--green)}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo-mark"><div class="logo-inner"></div></div>
    <h1>DWSIM <span>Cloud</span></h1>
    <div class="hsep"></div>
    <div class="status-pill">
      <div class="sdot"></div>
      <span id="api-status">connecting…</span>
    </div>
  </header>
  <div class="main">

    <!-- Left panel -->
    <div id="left-panel">
      <div class="panel-header">Model Library</div>
      <div id="model-tree"><div style="padding:20px 16px;font-size:12px;color:var(--text3)">Loading…</div></div>
    </div>

    <!-- Canvas -->
    <div id="canvas-area">
      <div id="canvas-viewport">
        <div id="empty-state">
          <div class="big-icon">⬡</div>
          <h2>No Model Selected</h2>
          <p>Choose a simulation from the library on the left</p>
        </div>
        <div id="canvas-world">
          <svg id="flowchart-svg"></svg>
        </div>

        <!-- Zoom controls -->
        <div id="zoom-controls" style="display:none">
          <button class="zoom-btn" onclick="zoomBy(0.2)" title="Zoom in">+</button>
          <div id="zoom-level">100%</div>
          <button class="zoom-btn" onclick="zoomBy(-0.2)" title="Zoom out">−</button>
          <button class="zoom-btn" onclick="fitView()" title="Fit to view" style="font-size:12px">⊡</button>
        </div>
      </div>

      <div id="canvas-toolbar" style="display:none">
        <div style="min-width:0">
          <div id="model-title-bar"></div>
          <div id="model-desc-bar"></div>
        </div>
        <div class="hsep"></div>
        <button id="btn-fit" onclick="fitView()">⊡ FIT</button>
        <button id="btn-simulate" disabled>
          <div class="sim-spinner"></div>
          <span>▶ Simulate</span>
        </button>
      </div>
    </div>

    <!-- Right panel -->
    <div id="right-panel">
      <div id="results-header"><div id="rdot"></div>Results</div>
      <div id="results-body">
        <div id="results-empty">
          <div class="empty-icon">◎</div>
          <div>Run a simulation to<br>see results here</div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Popup -->
<div id="popup-overlay">
  <div id="popup">
    <div class="popup-header">
      <div class="popup-icon" id="popup-icon"></div>
      <div><div class="popup-title" id="popup-title"></div><div class="popup-subtitle" id="popup-subtitle"></div></div>
      <button class="popup-close" onclick="closePopup()">✕</button>
    </div>
    <div class="popup-body" id="popup-body"></div>
    <div class="popup-footer">
      <button class="btn-sec" onclick="closePopup()">Cancel</button>
      <button class="btn-pri" onclick="applyPopup()">Apply</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────────
// Config & State
// ─────────────────────────────────────────────────────────────────
const API = 'http://localhost:8001';

let models = [], activeModel = null, inputValues = {}, popupNode = null;

// Pan/zoom state
const vp = {
  tx: 0, ty: 0,        // translation
  scale: 1,            // current zoom
  minScale: 0.1,
  maxScale: 4,
  isDragging: false,
  startX: 0, startY: 0,
  startTx: 0, startTy: 0,
};

// World dimensions (set when flowchart renders)
let worldW = 900, worldH = 500;

// ─────────────────────────────────────────────────────────────────
// Pan / Zoom engine
// ─────────────────────────────────────────────────────────────────
const viewport  = document.getElementById('canvas-viewport');
const world     = document.getElementById('canvas-world');

function applyTransform() {
  world.style.transform = `translate(${vp.tx}px,${vp.ty}px) scale(${vp.scale})`;
  document.getElementById('zoom-level').textContent = Math.round(vp.scale * 100) + '%';
}

function zoomBy(delta, cx, cy) {
  const vRect = viewport.getBoundingClientRect();
  // Default pivot: viewport center
  if (cx === undefined) cx = vRect.width  / 2;
  if (cy === undefined) cy = vRect.height / 2;

  const newScale = Math.min(vp.maxScale, Math.max(vp.minScale, vp.scale + delta));
  if (newScale === vp.scale) return;

  // Zoom toward cursor: keep the world point under cursor fixed
  const ratio = newScale / vp.scale;
  vp.tx = cx - ratio * (cx - vp.tx);
  vp.ty = cy - ratio * (cy - vp.ty);
  vp.scale = newScale;
  applyTransform();
}

function fitView() {
  const vRect = viewport.getBoundingClientRect();
  const padding = 80;
  const scaleX = (vRect.width  - padding * 2) / worldW;
  const scaleY = (vRect.height - padding * 2) / worldH;
  vp.scale = Math.min(scaleX, scaleY, vp.maxScale);
  vp.tx = (vRect.width  - worldW * vp.scale) / 2;
  vp.ty = (vRect.height - worldH * vp.scale) / 2;
  applyTransform();
}

// Mouse wheel zoom
viewport.addEventListener('wheel', e => {
  if (!activeModel) return;
  e.preventDefault();
  const rect = viewport.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  const delta = e.deltaY < 0 ? 0.12 : -0.12;
  zoomBy(delta, cx, cy);
}, { passive: false });

// Pan — mouse
viewport.addEventListener('mousedown', e => {
  // Don't pan if clicking an SVG interactive element
  if (e.target.closest('.fc-stream,.fc-equip')) return;
  if (e.button !== 0) return;
  vp.isDragging = true;
  vp.startX = e.clientX; vp.startY = e.clientY;
  vp.startTx = vp.tx;    vp.startTy = vp.ty;
  viewport.classList.add('panning');
});

window.addEventListener('mousemove', e => {
  if (!vp.isDragging) return;
  vp.tx = vp.startTx + (e.clientX - vp.startX);
  vp.ty = vp.startTy + (e.clientY - vp.startY);
  applyTransform();
});

window.addEventListener('mouseup', () => {
  if (!vp.isDragging) return;
  vp.isDragging = false;
  viewport.classList.remove('panning');
});

// Pan — touch
let touch0 = null;
viewport.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    touch0 = { x: e.touches[0].clientX, y: e.touches[0].clientY, tx: vp.tx, ty: vp.ty };
  }
}, { passive: true });

viewport.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && touch0) {
    vp.tx = touch0.tx + (e.touches[0].clientX - touch0.x);
    vp.ty = touch0.ty + (e.touches[0].clientY - touch0.y);
    applyTransform();
  }
}, { passive: true });

viewport.addEventListener('touchend', () => { touch0 = null; });

// Keyboard shortcuts
window.addEventListener('keydown', e => {
  if (!activeModel) return;
  if (e.key === '0' || e.key === 'f') fitView();
  if (e.key === '+' || e.key === '=') zoomBy(0.15);
  if (e.key === '-') zoomBy(-0.15);
});

// ─────────────────────────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────────────────────────
async function boot() {
  try {
    const r = await fetch(`${API}/health`);
    const d = await r.json();
    document.getElementById('api-status').textContent =
      `API online · ${d.models_loaded} model${d.models_loaded !== 1 ? 's' : ''}`;
    await loadModels();
  } catch(e) {
    document.getElementById('api-status').textContent = 'API offline';
    document.querySelector('.sdot').style.cssText = 'background:var(--red);box-shadow:0 0 6px var(--red)';
    toast('Cannot reach API at ' + API, 'error');
  }
}

async function loadModels() {
  const r = await fetch(`${API}/models`);
  models = await r.json();
  renderModelTree();
}

// ─────────────────────────────────────────────────────────────────
// Left panel
// ─────────────────────────────────────────────────────────────────
function renderModelTree() {
  const tree = document.getElementById('model-tree');
  const ICONS = { pump:'⚙', hex:'♨', heat:'♨', column:'▭', reactor:'⬡', default:'◈' };
  const cats = {};
  models.forEach(m => {
    const c = (m.tags && m.tags[0]) ? m.tags[0] : 'other';
    (cats[c] = cats[c] || []).push(m);
  });
  tree.innerHTML = '';
  Object.entries(cats).forEach(([cat, items]) => {
    const icon = ICONS[cat.toLowerCase()] || ICONS.default;
    const el = document.createElement('div');
    el.className = 'category open';
    el.innerHTML = `
      <div class="category-header" onclick="this.parentElement.classList.toggle('open')">
        <svg class="cat-arrow" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="3,2 7,5 3,8"/></svg>
        <span>${icon}</span><span>${cat.toUpperCase()}</span>
      </div>
      <div class="category-models">
        ${items.map(m => `
          <div class="model-item" data-id="${m.id}" onclick="selectModel('${m.id}')">
            <div class="model-dot"></div>
            <div>
              <div>${m.name}</div>
              <div class="model-tags">${(m.tags||[]).slice(1).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
            </div>
          </div>`).join('')}
      </div>`;
    tree.appendChild(el);
  });
}

// ─────────────────────────────────────────────────────────────────
// Select model
// ─────────────────────────────────────────────────────────────────
async function selectModel(id) {
  document.querySelectorAll('.model-item').forEach(el => el.classList.toggle('active', el.dataset.id === id));
  try {
    const r = await fetch(`${API}/models/${id}`);
    activeModel = await r.json();
    inputValues = {};
    activeModel.schema.inputs.forEach(f => { inputValues[f.id] = f.default ?? ''; });
    renderCanvas();
    clearResults();
  } catch(e) { toast('Failed to load model schema', 'error'); }
}

// ─────────────────────────────────────────────────────────────────
// SVG helpers
// ─────────────────────────────────────────────────────────────────
function ms(tag, attrs = {}) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
  return el;
}
function hexPts(cx, cy, r) {
  return Array.from({length:6}, (_, i) => {
    const a = Math.PI / 180 * (60 * i - 30);
    return `${cx + r*Math.cos(a)},${cy + r*Math.sin(a)}`;
  }).join(' ');
}
function fmtHint(f, val) {
  const v = (val !== undefined && val !== '') ? val : (f.default ?? '');
  const short = f.label.split(' ').pop();
  return `${short}: ${v} ${f.unit}`;
}
function fmtVal(v) {
  if (v === undefined || v === null) return '—';
  const n = parseFloat(v);
  if (isNaN(n)) return String(v);
  if (Math.abs(n) >= 1e6)  return n.toExponential(3);
  if (Math.abs(n) >= 1000) return n.toFixed(1);
  if (Math.abs(n) >= 1)    return n.toFixed(4);
  return n.toExponential(3);
}

// ─────────────────────────────────────────────────────────────────
// Render flowchart
// ─────────────────────────────────────────────────────────────────
function renderCanvas() {
  const { meta, schema } = activeModel;
  const { nodes, connections } = schema.flowchart;

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('canvas-toolbar').style.display = 'flex';
  document.getElementById('zoom-controls').style.display = 'flex';
  document.getElementById('model-title-bar').textContent = meta.name;
  document.getElementById('model-desc-bar').textContent  = meta.description;
  document.getElementById('btn-simulate').disabled = false;

  const N = nodes.length;
  const NODE_GAP = 220;
  const STREAM_R = 26;
  const EQUIP_R  = 42;
  const PADDING  = 120;

  worldW = PADDING * 2 + (N - 1) * NODE_GAP;
  worldH = 400;
  const cy = worldH / 2;

  const pos = {};
  nodes.forEach((n, i) => {
    pos[n.id] = { x: PADDING + i * NODE_GAP, y: cy };
  });

  const svg = document.getElementById('flowchart-svg');
  svg.innerHTML = '';
  svg.setAttribute('width',  worldW);
  svg.setAttribute('height', worldH);

  // ── Connections ──
  connections.forEach(c => {
    const f = pos[c.from], t = pos[c.to];
    if (!f || !t) return;
    const fn = nodes.find(n => n.id === c.from);
    const tn = nodes.find(n => n.id === c.to);
    const x1 = f.x + (fn.type === 'stream' ? STREAM_R : EQUIP_R);
    const x2 = t.x - (tn.type === 'stream' ? STREAM_R : EQUIP_R);

    // Pipe shadow
    svg.appendChild(ms('line', { x1, y1:cy, x2, y2:cy, stroke:'#0d0f12', 'stroke-width':7, 'stroke-linecap':'round' }));
    // Pipe body
    svg.appendChild(ms('line', { x1, y1:cy, x2, y2:cy, stroke:'#2a3040', 'stroke-width':4, 'stroke-linecap':'round' }));
    // Flow arrow
    const mx = (x1 + x2) / 2;
    svg.appendChild(ms('polygon', { points:`${mx-8},${cy-6} ${mx+8},${cy} ${mx-8},${cy+6}`, fill:'#3a4358' }));

    // Pipe label (connection midpoint)
    const lbl = ms('text', { x:mx, y:cy - 14, 'text-anchor':'middle', 'font-family':'Share Tech Mono,monospace', 'font-size':'9px', fill:'#3a4358', 'pointer-events':'none' });
    lbl.textContent = `${c.from} → ${c.to}`;
    svg.appendChild(lbl);
  });

  // ── Nodes ──
  nodes.forEach(n => {
    const p = pos[n.id];
    const ni = schema.inputs.filter(f => f.node === n.id);
    const no = (schema.outputs || []).filter(f => f.node === n.id);
    const g  = ms('g', { class: n.type === 'stream' ? 'fc-stream' : 'fc-equip' });

    if (n.type === 'stream') {
      // Glow ring
      g.appendChild(ms('circle', { cx:p.x, cy:p.y, r:STREAM_R+6, fill:'none', stroke:'#00c8ff', 'stroke-width':.5, opacity:.3 }));
      // Body
      g.appendChild(ms('circle', { cx:p.x, cy:p.y, r:STREAM_R, fill:'#13161b', stroke:'#00c8ff', 'stroke-width':1.5 }));
      // Center dot
      g.appendChild(ms('circle', { cx:p.x, cy:p.y, r:5, fill:'#00c8ff', opacity:.8 }));

      // Label above
      const lbl = ms('text', { class:'node-label', x:p.x, y:p.y - STREAM_R - 14 });
      lbl.textContent = n.label; g.appendChild(lbl);

      // Input hints below node
      ni.slice(0,3).forEach((f, fi) => {
        const h = ms('text', { class:'node-sublabel', x:p.x, y:p.y + STREAM_R + 18 + fi*14, 'data-field':f.id });
        h.textContent = fmtHint(f, inputValues[f.id]); g.appendChild(h);
      });
      if (ni.length > 0) {
        const ch = ms('text', { class:'click-hint', x:p.x, y:p.y + STREAM_R + 18 + Math.min(ni.length,3)*14 + 4 });
        ch.textContent = '[ click to edit ]'; g.appendChild(ch);
        g.addEventListener('click', () => openPopup(n, ni));
      }

      // Result labels (hidden until results)
      no.forEach((f, fi) => {
        const rl = ms('text', { class:'result-value-label', id:`rvl-${f.id}`, x:p.x, y:p.y + STREAM_R + 18 + fi*14 });
        rl.textContent = ''; g.appendChild(rl);
      });

    } else {
      // Equipment
      // Glow ring
      g.appendChild(ms('polygon', { points:hexPts(p.x, p.y, EQUIP_R+6), fill:'none', stroke:'#ffb020', 'stroke-width':.5, opacity:.3 }));
      // Body
      g.appendChild(ms('polygon', { class:'equip-body', points:hexPts(p.x, p.y, EQUIP_R), fill:'#1a1e26', stroke:'#ffb020', 'stroke-width':1.5 }));
      // Icon
      const ic = ms('text', { x:p.x, y:p.y+7, 'text-anchor':'middle', 'font-size':'22px', fill:'#ffb020', 'pointer-events':'none' });
      ic.textContent = '⚙'; g.appendChild(ic);

      // Label above
      const lbl = ms('text', { class:'node-label', x:p.x, y:p.y - EQUIP_R - 14 });
      lbl.textContent = n.label; g.appendChild(lbl);

      // Input hints below
      ni.slice(0,2).forEach((f, fi) => {
        const h = ms('text', { class:'node-sublabel', x:p.x, y:p.y + EQUIP_R + 18 + fi*14, 'data-field':f.id });
        h.textContent = fmtHint(f, inputValues[f.id]); g.appendChild(h);
      });
      if (ni.length > 0) {
        const ch = ms('text', { class:'click-hint', x:p.x, y:p.y + EQUIP_R + 18 + Math.min(ni.length,2)*14 + 4 });
        ch.textContent = '[ click to edit ]'; g.appendChild(ch);
        g.addEventListener('click', () => openPopup(n, ni));
      }

      // Result labels
      no.forEach((f, fi) => {
        const rl = ms('text', { class:'result-value-label', id:`rvl-${f.id}`, x:p.x, y:p.y + EQUIP_R + 18 + fi*14 });
        rl.textContent = ''; g.appendChild(rl);
      });
    }

    svg.appendChild(g);
  });

  // Fit to view after a brief paint delay
  requestAnimationFrame(() => requestAnimationFrame(fitView));
}

// ─────────────────────────────────────────────────────────────────
// Popup
// ─────────────────────────────────────────────────────────────────
function openPopup(node, fields) {
  popupNode = node;
  const isStream = node.type === 'stream';
  const pi = document.getElementById('popup-icon');
  pi.className = `popup-icon ${isStream ? 'stream' : 'equipment'}`;
  pi.textContent = isStream ? '◉' : '⚙';
  document.getElementById('popup-title').textContent = node.label;
  document.getElementById('popup-subtitle').textContent = isStream ? 'Stream conditions' : 'Equipment parameters';
  document.getElementById('popup-body').innerHTML = fields.map(f => `
    <div class="field-group">
      <div class="field-label">
        <span>${f.label}</span>
        <span class="field-unit">${f.unit}</span>
      </div>
      <input class="field-input" type="number"
        id="pf-${f.id}"
        value="${inputValues[f.id] !== undefined ? inputValues[f.id] : f.default}"
        min="${f.min ?? ''}" max="${f.max ?? ''}" step="any"/>
      ${f.description ? `<div class="field-desc">${f.description}</div>` : ''}
    </div>`).join('');
  document.getElementById('popup-overlay').classList.add('open');
  setTimeout(() => { const fi = document.querySelector('.field-input'); if(fi) fi.focus(); }, 50);
}

function closePopup() {
  document.getElementById('popup-overlay').classList.remove('open');
  popupNode = null;
}

function applyPopup() {
  activeModel.schema.inputs.filter(f => f.node === popupNode.id).forEach(f => {
    const el = document.getElementById(`pf-${f.id}`);
    if (el) {
      inputValues[f.id] = parseFloat(el.value);
      const h = document.querySelector(`[data-field="${f.id}"]`);
      if (h) h.textContent = fmtHint(f, inputValues[f.id]);
    }
  });
  closePopup();
  toast('Values updated', 'success');
}

document.getElementById('popup-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('popup-overlay')) closePopup();
});

// ─────────────────────────────────────────────────────────────────
// Simulate
// ─────────────────────────────────────────────────────────────────
document.getElementById('btn-simulate').addEventListener('click', async () => {
  if (!activeModel) return;
  const btn = document.getElementById('btn-simulate');
  btn.disabled = true; btn.classList.add('loading');
  btn.querySelector('span').textContent = 'Running…';
  try {
    const r = await fetch(`${API}/run/${activeModel.meta.id}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(inputValues)
    });
    const d = await r.json();
    if (!r.ok) {
      const errs = d.detail?.validation_errors || [d.detail || 'Unknown error'];
      toast('Validation: ' + errs.join(' | '), 'error'); return;
    }
    renderResults(d);
    updateFlowchartResults(d.outputs);
    toast('Simulation complete ✓', 'success');
  } catch(e) {
    toast('Simulation failed: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.classList.remove('loading');
    btn.querySelector('span').textContent = '▶ Simulate';
  }
});

// ─────────────────────────────────────────────────────────────────
// Results
// ─────────────────────────────────────────────────────────────────
function renderResults(data) {
  const { schema } = activeModel;
  document.getElementById('rdot').classList.add('ready');
  const byNode = {};
  schema.outputs.forEach(f => {
    const node = schema.flowchart.nodes.find(n => n.id === f.node);
    const key  = node ? node.label : f.node;
    (byNode[key] = byNode[key] || []).push(f);
  });
  let html = '';
  Object.entries(byNode).forEach(([g, fields], gi) => {
    html += `<div class="result-group"><div class="result-group-title">${g}</div>
      ${fields.map((f, fi) => `
        <div class="result-row" style="animation-delay:${(gi*fields.length+fi)*60}ms">
          <span class="result-label">${f.label}</span>
          <span class="result-val">${fmtVal(data.outputs[f.id])}<span class="result-unit">${f.unit}</span></span>
        </div>`).join('')}
    </div>`;
  });
  html += `<div class="duration-bar"><span>Solve time</span><span class="duration-val">${data.duration_ms} ms</span></div>`;
  document.getElementById('results-body').innerHTML = html;
}

function updateFlowchartResults(outputs) {
  activeModel.schema.outputs.forEach(f => {
    const el = document.getElementById(`rvl-${f.id}`);
    if (el) {
      const short = f.label.split(' ').pop();
      el.textContent = `${short}: ${fmtVal(outputs[f.id])} ${f.unit}`;
      el.classList.add('visible');
    }
  });
}

function clearResults() {
  document.getElementById('rdot').classList.remove('ready');
  document.getElementById('results-body').innerHTML = `
    <div id="results-empty">
      <div class="empty-icon">◎</div>
      <div>Run a simulation to<br>see results here</div>
    </div>`;
}

// ─────────────────────────────────────────────────────────────────
// Toast
// ─────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = type ? `show ${type}` : 'show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}

boot();
</script>
</body>
</html>
